<script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.0/dist/TronWeb.js"></script>
<script>
    // ১. ট্রন Nile টেস্টনেট কানেকশন সেটআপ
    const HttpProvider = TronWeb.providers.HttpProvider;
    const fullNode = new HttpProvider("https://api.nileex.io");
    const solidityNode = new HttpProvider("https://api.nileex.io");
    const eventServer = new HttpProvider("https://api.nileex.io");
    
    // ⚠️ এখানে আপনার নিজের ওয়ালেটের Private Key বসাতেই হবে
    const privateKey = "YOUR_TESTNET_PRIVATE_KEY"; 
    
    // ⚠️ এখানে আপনার তৈরি করা TRC20 টোকেনের Contract Address বসাতে হবে
    const tokenContractAddress = "YOUR_DEPLOYED_TRC20_CONTRACT_ADDRESS";

    // ২. গ্লোবালি TronWeb তৈরি করা (যাতে 'before initialization' এরর না আসে)
    const tronWeb = new TronWeb(fullNode, solidityNode, eventServer, privateKey);

    // ৩. বাটন ক্লিকের ফাংশন
    async function sendFlashTRC20() {
        const receiver = document.getElementById('receiverAddress').value;
        const amount = document.getElementById('amount').value;
        const statusDiv = document.getElementById('statusMessage');

        if (!receiver || !amount) {
            statusDiv.innerHTML = "❌ Please fill all fields!";
            return;
        }

        statusDiv.innerHTML = "⏳ Initiating blockchain transaction...";

        try {
            // কন্ট্রাক্ট অবজেক্ট কল
            let contract = await tronWeb.contract().at(tokenContractAddress);
            
            // অ্যামাউন্টকে Sun-এ কনভার্ট করা (TRC20 ডেসিমাল সাধারণত ৬ বা ১৮ হয়)
            let txAmount = tronWeb.toSun(amount); 

            statusDiv.innerHTML = "🚀 Sending token to network...";
            
            // টোকেন ট্রান্সফার এক্সিকিউট করা
            let transaction = await contract.transfer(receiver, txAmount).send();

            statusDiv.innerHTML = `✅ Successfully Sent ${amount} TRC20! <br> TXID: ${transaction}`;
            
        } catch (error) {
            console.error(error);
            statusDiv.innerHTML = "❌ Transaction Failed: " + error.message;
        }
    }
</script>
